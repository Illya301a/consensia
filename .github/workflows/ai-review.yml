name: Consensia Commit Review

on:
  push:
    branches:
      - main
      - 'feature/**' # Pattern for feature branches

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Enough to compare current and previous commits

      - name: Run Consensia AI Reviewer
        uses: Ashixi/consensia-action@main
        with:
          api-key: ${{ secrets.CONSENSIA_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          target: 'commit' # Indicates this is a direct commit
          mode: 'BALANCED'